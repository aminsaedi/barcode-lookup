name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# CF authentication: set either CF_API_TOKEN (long-lived, preferred)
# OR CF_REFRESH_TOKEN (wrangler OAuth refresh token — auto-refreshed per run).
# Also set CF_ACCOUNT_ID and KV_NAMESPACE_ID.

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    outputs:
      cf-token: ${{ steps.auth.outputs.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve CF auth token
        id: auth
        run: |
          if [ -n "$CF_API_TOKEN" ]; then
            echo "Using CF_API_TOKEN directly"
            echo "::add-mask::$CF_API_TOKEN"
            echo "token=$CF_API_TOKEN" >> $GITHUB_OUTPUT
          elif [ -n "$CF_REFRESH_TOKEN" ]; then
            echo "Refreshing CF OAuth token..."
            RESP=$(curl -sf -X POST "https://dash.cloudflare.com/oauth2/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "grant_type=refresh_token&refresh_token=${CF_REFRESH_TOKEN}&client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7")
            TOKEN=$(echo "$RESP" | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])")
            echo "::add-mask::$TOKEN"
            echo "token=$TOKEN" >> $GITHUB_OUTPUT
          else
            echo "Error: set CF_API_TOKEN or CF_REFRESH_TOKEN secret"
            exit 1
          fi
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_REFRESH_TOKEN: ${{ secrets.CF_REFRESH_TOKEN }}

      - name: Generate PWA icons
        run: npm run generate-icons

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ steps.auth.outputs.token }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=barcode-lookup --commit-dirty=true

  seed:
    name: Seed KV data
    runs-on: ubuntu-latest
    needs: deploy
    if: |
      contains(toJson(github.event.commits), 'data/products.csv') ||
      contains(github.event.head_commit.message, '[seed]') ||
      github.run_number == 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve CF auth token
        id: auth
        run: |
          if [ -n "$CF_API_TOKEN" ]; then
            echo "::add-mask::$CF_API_TOKEN"
            echo "token=$CF_API_TOKEN" >> $GITHUB_OUTPUT
          elif [ -n "$CF_REFRESH_TOKEN" ]; then
            RESP=$(curl -sf -X POST "https://dash.cloudflare.com/oauth2/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "grant_type=refresh_token&refresh_token=${CF_REFRESH_TOKEN}&client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7")
            TOKEN=$(echo "$RESP" | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])")
            echo "::add-mask::$TOKEN"
            echo "token=$TOKEN" >> $GITHUB_OUTPUT
          else
            echo "Error: set CF_API_TOKEN or CF_REFRESH_TOKEN secret"
            exit 1
          fi
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_REFRESH_TOKEN: ${{ secrets.CF_REFRESH_TOKEN }}

      - name: Seed production KV
        run: node scripts/seed.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.auth.outputs.token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}

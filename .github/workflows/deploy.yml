name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Required GitHub secrets:
#   CF_API_TOKEN  - Cloudflare API token (Pages:Edit + Workers KV Storage:Edit)
#   CF_ACCOUNT_ID - Your Cloudflare account ID
#   KV_NAMESPACE_ID - The PRODUCTS_KV namespace ID (d0c199b97016407490e62cb9bc40c495)
#
# Create the token: dash.cloudflare.com → My Profile → API Tokens → Create Token
# Use "Edit Cloudflare Workers" template + add "Cloudflare Pages:Edit"

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate PWA icons
        run: npm run generate-icons

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=barcode-lookup --commit-dirty=true

  seed:
    name: Seed KV data
    runs-on: ubuntu-latest
    needs: deploy
    if: |
      contains(toJson(github.event.commits), 'data/products.csv') ||
      contains(github.event.head_commit.message, '[seed]') ||
      github.run_number == 1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Seed production KV
        run: node scripts/seed.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
